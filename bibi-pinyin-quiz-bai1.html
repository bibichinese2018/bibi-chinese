<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiBi Chinese – Quiz Bài 1: Từ Mới</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap');

  :root {
    --red:   #C0392B;
    --gold:  #D4A017;
    --cream: #FDF6E3;
    --ink:   #2C1A0E;
    --light: #FAF0D7;
    --green: #27AE60;
    --wrong: #E74C3C;
    --gray:  #95A5A6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: var(--red);
    padding: 16px 20px 12px;
    text-align: center;
  }
  header .brand {
    font-family: 'Noto Serif SC', serif;
    color: var(--gold);
    font-size: 20px;
    letter-spacing: 2px;
  }
  header .sub {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    margin-top: 3px;
    letter-spacing: 1px;
  }

  .progress-bar-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.2); }
  .progress-bar-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
  }

  .question-card {
    background: white;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 24px 20px 18px;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 6px 16px 0;
    text-align: center;
    box-shadow: 0 4px 18px rgba(192,57,43,0.08);
  }

  .q-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray);
    margin-bottom: 10px;
  }

  .q-viet {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .q-num {
    font-size: 12px;
    color: var(--gray);
    margin-top: 6px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 14px 16px 0;
  }

  .choice-btn {
    background: var(--light);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 14px 8px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  .choice-btn:hover:not(:disabled) {
    background: #FDE8B0;
    transform: translateY(-2px);
  }

  .choice-btn.correct { background: #D5F5E3; border-color: var(--green); color: #1A6B3C; }
  .choice-btn.wrong   { background: #FADBD8; border-color: var(--wrong); color: #922B21; }
  .choice-btn:disabled { cursor: default; }

  .feedback {
    margin: 12px 16px 0;
    width: calc(100% - 32px);
    max-width: 480px;
    min-height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    padding: 10px;
    text-align: center;
    transition: opacity 0.2s;
  }
  .feedback.show { opacity: 1; }
  .feedback.ok { background: #D5F5E3; color: #1A6B3C; }
  .feedback.no { background: #FADBD8; color: #922B21; }

  .next-btn {
    display: none;
    margin: 12px auto 0;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .next-btn:hover { background: #A93226; }

  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    text-align: center;
    width: 100%;
    max-width: 480px;
  }
  .result-screen .big { font-size: 64px; margin-bottom: 10px; }
  .result-screen h2 { font-family: 'Noto Serif SC', serif; font-size: 24px; color: var(--red); margin-bottom: 8px; }
  .result-screen p { font-size: 16px; color: var(--ink); margin-bottom: 24px; }

  .restart-btn {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .restart-btn:hover { background: #A93226; }

  footer {
    margin-top: auto;
    padding: 18px;
    font-size: 11px;
    color: var(--gray);
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">笔笔中文 · BiBi Chinese</div>
  <div class="sub">BÀI 1 · SINH TỪ · CHỌN PINYIN ĐÚNG</div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="score-row" id="scoreRow">
  <span id="scoreText">✅ 0 &nbsp;❌ 0</span>
  <span id="qCounter">Câu 1 / 31</span>
</div>

<div class="question-card" id="questionCard">
  <div class="q-label">Nghĩa tiếng Việt → Chọn pinyin đúng</div>
  <div class="q-viet" id="qViet">—</div>
  <div class="q-num" id="qNum"></div>
</div>

<div class="choices" id="choicesGrid"></div>
<div class="feedback" id="feedback"></div>
<button class="next-btn" id="nextBtn" onclick="nextQuestion()">Tiếp theo →</button>

<div class="result-screen" id="resultScreen">
  <div class="big" id="resultEmoji">🎉</div>
  <h2 id="resultTitle"></h2>
  <p id="resultMsg"></p>
  <button class="restart-btn" onclick="restartQuiz()">Làm lại từ đầu 🔄</button>
</div>

<footer>cô Bi · BiBi Chinese © 2026</footer>

<script>
const WORDS = [
  { p: "wǒ",        v: "Tôi, tao, tớ, tui" },
  { p: "nǐ",        v: "Bạn, mày, cậu" },
  { p: "tā (nam)",  v: "Anh ấy, cậu ấy, chú ấy..." },
  { p: "tā (nữ)",   v: "Chị ấy, cô, dì, thím..." },
  { p: "tā men",    v: "Các anh ấy... Các chị ấy... Bọn họ" },
  { p: "tā (vật)",  v: "Nó..." },
  { p: "wǒ men",    v: "Chúng tôi, chúng ta" },
  { p: "nǐ men",    v: "Các bạn" },
  { p: "dà jiā",    v: "Cả nhà, mọi người" },
  { p: "jiào",      v: "Kêu, gọi, tên là" },
  { p: "shén me",   v: "Gì, cái gì" },
  { p: "míng zì",   v: "Tên" },
  { p: "xìng",      v: "Họ" },
  { p: "qǐng wèn",  v: "Xin hỏi" },
  { p: "hěn",       v: "Rất, lắm, quá, hết sức" },
  { p: "rèn shi",   v: "Quen biết" },
  { p: "gāo xìng",  v: "Vui mừng, phấn khởi" },
  { p: "guì xìng",  v: "Quý danh, quý tính" },
  { p: "ne?",       v: "Thì sao?" },
  { p: "hǎo",       v: "Tốt, khỏe, ngon, ok..." },
  { p: "bù",        v: "Không" },
  { p: "ne? (2)",   v: "Thì sao? thế, nhé" },
  { p: "le",        v: "Rồi" },
  { p: "shéi / shuí", v: "Ai?" },
  { p: "wèi shén me", v: "Tại sao?" },
  { p: "qù",        v: "Đi" },
  { p: "ma?",       v: "Không? (câu hỏi)" },
  { p: "shàng bān", v: "Lên ca" },
  { p: "xià bān",   v: "Xuống ca" },
  { p: "jiā bān",   v: "Tăng ca" },
  { p: "yě",        v: "Cũng" },
];

let queue = [], current = 0, correct = 0, wrong = 0, answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getDistractors(correctIdx, count) {
  const pool = WORDS.filter((_, i) => i !== correctIdx).map(w => w.p);
  shuffle(pool);
  return pool.slice(0, count);
}

function startQuiz() {
  queue = shuffle([...Array(WORDS.length).keys()]);
  current = 0; correct = 0; wrong = 0;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('questionCard').style.display = '';
  document.getElementById('choicesGrid').style.display = '';
  document.getElementById('scoreRow').style.display = '';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const idx = queue[current];
  const word = WORDS[idx];

  document.getElementById('qViet').textContent = word.v;
  document.getElementById('qNum').textContent = `Từ số ${idx + 1} / ${WORDS.length}`;
  document.getElementById('progressBar').style.width = (current / WORDS.length * 100) + '%';
  document.getElementById('qCounter').textContent = `Câu ${current + 1} / ${WORDS.length}`;
  document.getElementById('scoreText').innerHTML = `✅ ${correct} &nbsp;❌ ${wrong}`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const distractors = getDistractors(idx, 3);
  const options = shuffle([word.p, ...distractors]);

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, word.p);
    grid.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct_p) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct_p) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct_p) {
    correct++;
    btn.classList.add('correct');
    fb.textContent = '✅ Chính xác! 很好！';
    fb.className = 'feedback show ok';
  } else {
    wrong++;
    btn.classList.add('wrong');
    fb.textContent = `❌ Sai rồi! Đáp án đúng: ${correct_p}`;
    fb.className = 'feedback show no';
  }

  document.getElementById('scoreText').innerHTML = `✅ ${correct} &nbsp;❌ ${wrong}`;
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= WORDS.length) showResult();
  else loadQuestion();
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('choicesGrid').style.display = 'none';
  document.getElementById('scoreRow').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';

  const pct = Math.round(correct / WORDS.length * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '💪' : '📚';
  const title = pct >= 90 ? 'Xuất sắc! 优秀！' : pct >= 70 ? 'Làm tốt lắm! 真棒！' : pct >= 50 ? 'Cố lên! 加油！' : 'Cần ôn thêm nhé!';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = `Bạn trả lời đúng ${correct} / ${WORDS.length} câu (${pct}%)`;
  document.getElementById('resultScreen').style.display = 'flex';
}

function restartQuiz() { startQuiz(); }

startQuiz();
</script>
</body>
</html>
